<!DOCTYPE html>
<!--
  index.html — homepage: hero reel, work grid (built from data/projects.json), contact info.
  Nav labels: "Projects" -> #work, "Info" -> #contact, "Contact" -> intake-form.html.
  style.css is versioned (?v=7) as a cache-buster; bump the number on every CSS edit
  across ALL pages that link it, or browsers may keep serving a stale stylesheet.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismael OB — Coloriste</title>
<meta name="description" content="Ismael OB, coloriste basé à Montréal. Étalonnage pour publicités, vidéoclips, films et télévision.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=15">
<script src="i18n.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr data-key="nav.eyebrow"></span><span data-en data-key="nav.eyebrow"></span></span>
  </div>
  <div class="nav-links">
    <a href="#work"><span data-fr data-key="nav.work"></span><span data-en data-key="nav.work"></span></a>
    <a href="#contact"><span data-fr data-key="nav.info"></span><span data-en data-key="nav.info"></span></a>
    <a href="intake-form.html"><span data-fr data-key="nav.contact"></span><span data-en data-key="nav.contact"></span></a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<!-- Hero: self-hosted reel (video/reel.mp4), sized/muted via the script at the bottom -->
<header class="hero">
  <div class="reel-frame">
    <div class="reel-embed">
      <video id="reel-video" autoplay muted loop playsinline preload="auto" title="Ismael OB - Demo Reel" disableRemotePlayback disablePictureInPicture>
        <source src="video/reel.mp4" type="video/mp4">
      </video>
      <button id="sound-toggle" type="button" aria-label="Toggle sound">
        <svg id="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9V15H7L12 20V4L7 9H3Z" fill="currentColor"/>
          <path d="M16 8L21 16M21 8L16 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <svg id="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
          <path d="M3 9V15H7L12 20V4L7 9H3Z" fill="currentColor"/>
          <path d="M16 8.5C17 9.5 17.5 10.7 17.5 12C17.5 13.3 17 14.5 16 15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M18.5 6C20.2 7.7 21 9.8 21 12C21 14.2 20.2 16.3 18.5 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Work grid: empty on load, filled by renderWorkGrid() from data/projects.json -->
<section id="work">
  <div class="section-head">
    <h2><span data-fr data-key="work.heading"></span><span data-en data-key="work.heading"></span></h2>
    <div class="category-filter" id="category-filter"></div>
  </div>

  <div class="work-grid" id="work-grid"></div>
</section>

<section class="contact" id="contact">
  <h2 class="contact-title">
    <span data-fr data-key="contact.heading"></span>
    <span data-en data-key="contact.heading"></span>
  </h2>
  <dl class="contact-grid">
    <div>
      <dt><span data-fr data-key="contact.email_label"></span><span data-en data-key="contact.email_label"></span></dt>
      <dd><a id="contact-email" href="#" target="_blank" rel="noopener"></a></dd>
    </div>
    <div>
      <dt><span data-fr data-key="contact.location_label"></span><span data-en data-key="contact.location_label"></span></dt>
      <dd><span data-fr id="contact-location-fr"></span><span data-en id="contact-location-en"></span><br><span data-fr id="contact-availability-fr"></span><span data-en id="contact-availability-en"></span></dd>
    </div>
    <div>
      <dt>Instagram</dt>
      <dd><a id="contact-instagram" href="#" target="_blank" rel="noopener"></a></dd>
    </div>
  </dl>
</section>


<script>
  // ---------------------------------------------------------------
  // index.html script overview:
  //   1. Language toggle (FR/EN), persisted in localStorage
  //   2. Hero reel sizing (fills viewport below nav) + mute/unmute button
  //   3. Work grid, rendered from data/projects.json once data/strings.json (i18n.js)
  //      has also loaded, since card captions need the type acronyms it provides.
  //      Re-rendered on language change so those acronyms switch too.
  // ---------------------------------------------------------------

  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr'); // English is the default; only opt into French if remembered
  function updateLangButton() {
    // Button always shows the language you'd switch TO, not the current one
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  updateLangButton();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
    renderCategoryFilter(); // re-render so filter labels switch language too
    renderWorkGrid(); // re-render so card type tags (AD/PUB, MV/CLIP, etc.) switch language too
  });

  // Sizes the reel so it exactly fills the space below the sticky nav, fully visible
  // without scrolling on load. Math: available vertical space = viewport height minus
  // nav height minus the hero's own padding. Since the reel is 16:9, we convert that
  // available height into the matching width (height * 16/9) and cap the frame's
  // max-width there — the CSS aspect-ratio box then derives the height from that width.
  function sizeReel() {
    const nav = document.querySelector('.site-nav');
    const hero = document.querySelector('.hero');
    const frame = document.querySelector('.reel-frame');
    if (!nav || !hero || !frame) return;
    const navH = nav.offsetHeight;
    const heroStyles = getComputedStyle(hero);
    const heroPadV = parseFloat(heroStyles.paddingTop) + parseFloat(heroStyles.paddingBottom);
    const available = window.innerHeight - navH - heroPadV - 4; // 4px = small safety margin
    const maxWidthFromHeight = available * (16 / 9);
    frame.style.maxWidth = Math.max(280, maxWidthFromHeight) + 'px'; // 280px floor so it never gets absurdly small
  }
  window.addEventListener('load', sizeReel);
  window.addEventListener('resize', sizeReel);

  // Mute/unmute button overlaid on the reel. Starts muted (required for autoplay to
  // work in every browser); clicking just flips the video's own .muted property and
  // swaps which SVG icon is shown.
  const reelVideo = document.getElementById('reel-video');
  const soundBtn = document.getElementById('sound-toggle');
  const iconMuted = document.getElementById('icon-muted');
  const iconUnmuted = document.getElementById('icon-unmuted');
  if (reelVideo && soundBtn) {
    soundBtn.addEventListener('click', () => {
      reelVideo.muted = !reelVideo.muted;
      iconMuted.style.display = reelVideo.muted ? 'block' : 'none';
      iconUnmuted.style.display = reelVideo.muted ? 'none' : 'block';
    });
  }

  // Work grid: fetched once from data/projects.json and cached, then rendered into
  // #work-grid. Re-render (renderWorkGrid) is called again on language toggle above,
  // which is why the fetched list is cached in a variable instead of only used once.
  // activeFilter holds a project type code (e.g. 'TV') to show only that category, or
  // null to show everything — set by clicking a button in the category filter bar.
  let cachedProjects = null;
  let activeFilter = null;
  function renderWorkGrid() {
    const grid = document.getElementById('work-grid');
    if (!grid || !cachedProjects) return;
    const isFr = body.classList.contains('lang-fr');
    const visible = activeFilter ? cachedProjects.filter((p) => p.type === activeFilter) : cachedProjects;
    grid.innerHTML = visible.map((p) => `
      <a class="work-card" href="project.html?project=${encodeURIComponent(p.id)}">
        <div class="thumb" style="background-image:url('assets/${p.thumbnail}')"></div>
        <div class="work-card-meta">
          <p class="type">${projectTypeAcronym(p.type, isFr)}</p>
          ${p.artist ? `<p class="artist">${p.artist}</p>` : ''}
          <p class="title">${p.title}</p>
        </div>
      </a>
    `).join('');
  }

  // Category filter bar: one button per entry in PROJECT_TYPES (from i18n.js), plus an
  // "All"/"Tous" button to clear the filter. Rebuilt on language toggle since the labels
  // are bilingual; clicking a button just sets activeFilter and re-renders the grid —
  // it doesn't refetch anything, filtering happens against the already-cached project list.
  function renderCategoryFilter() {
    const container = document.getElementById('category-filter');
    if (!container) return;
    const isFr = body.classList.contains('lang-fr');
    const allLabel = STRINGS['work.filter_all'] ? (isFr ? STRINGS['work.filter_all'].fr : STRINGS['work.filter_all'].en) : 'All';
    const items = [{ code: null, label: allLabel }].concat(
      Object.keys(PROJECT_TYPES).map((code) => ({ code, label: projectTypeLabel(code, isFr) }))
    );
    container.innerHTML = items.map((item) => `
      <button type="button" class="${activeFilter === item.code ? 'active' : ''}" data-filter="${item.code || ''}">${item.label}</button>
    `).join('');
    container.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter || null;
        renderCategoryFilter();
        renderWorkGrid();
      });
    });
  }

  // i18n (all static bilingual copy + project type acronyms) and the project list are
  // independent fetches, loaded in parallel — applyStrings() needs the former, and
  // renderWorkGrid() needs both (project data plus the type acronyms i18n provides).
  Promise.all([
    loadI18n(),
    fetch('data/projects.json').then((r) => r.json())
  ])
    .then(([, data]) => {
      applyStrings();
      cachedProjects = data.projects;
      renderCategoryFilter();
      renderWorkGrid();
    })
    .catch((err) => console.error('Impossible de charger les données:', err));

  // Contact section: email, location, availability, Instagram — editable in the admin
  // ("Coordonnées" panel) without touching this file, since they're pulled from
  // data/settings.json rather than hardcoded here.
  fetch('data/settings.json')
    .then((r) => r.json())
    .then((s) => {
      const emailEl = document.getElementById('contact-email');
      emailEl.textContent = s.email;
      emailEl.href = 'mailto:' + s.email;
      document.getElementById('contact-location-fr').textContent = s.locationFr;
      document.getElementById('contact-location-en').textContent = s.locationEn;
      document.getElementById('contact-availability-fr').textContent = s.availabilityFr;
      document.getElementById('contact-availability-en').textContent = s.availabilityEn;
      const igEl = document.getElementById('contact-instagram');
      igEl.textContent = '@' + s.instagramHandle;
      igEl.href = 'https://instagram.com/' + s.instagramHandle;
    })
    .catch((err) => console.error('Impossible de charger les coordonnées:', err));
</script>
</body>
</html>
