<!DOCTYPE html>
<!--
  intake-form.html — the "Contact" nav link. 5-field lead form (kept short on purpose).
  No backend (static GitHub Pages site), so submitting opens a pre-filled mailto: link
  instead of posting to a server.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau projet — Ismael OB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=17">
<script src="i18n.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr data-key="nav.eyebrow"></span><span data-en data-key="nav.eyebrow"></span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr data-key="nav.work"></span><span data-en data-key="nav.work"></span></a>
    <a href="index.html#contact"><span data-fr data-key="nav.info"></span><span data-en data-key="nav.info"></span></a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<div class="form-wrap">
  <p class="eyebrow"><span data-fr data-key="intake.eyebrow"></span><span data-en data-key="intake.eyebrow"></span></p>
  <h1 style="font-family:var(--display); font-size:clamp(24px,4vw,34px); margin:10px 0 8px;">
    <span data-fr data-key="intake.heading"></span><span data-en data-key="intake.heading"></span>
  </h1>
  <p style="color:var(--fg-dim); font-size:13px; margin-bottom:32px;">
    <span data-fr data-key="intake.subheading"></span>
    <span data-en data-key="intake.subheading"></span>
  </p>

  <form id="intake-form">
    <div class="field">
      <label for="name"><span data-fr data-key="intake.name_label"></span><span data-en data-key="intake.name_label"></span></label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="field">
      <label for="email"><span data-fr data-key="intake.email_label"></span><span data-en data-key="intake.email_label"></span></label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="field">
      <label for="project-type"><span data-fr data-key="intake.type_label"></span><span data-en data-key="intake.type_label"></span></label>
      <select id="project-type" name="project-type" required>
        <option value=""></option>
      </select>
    </div>

    <div class="field">
      <label for="description"><span data-fr data-key="intake.description_label"></span><span data-en data-key="intake.description_label"></span></label>
      <textarea id="description" name="description" rows="5" data-placeholder-key="intake.description_placeholder"></textarea>
    </div>

    <div class="field">
      <label for="delivery-date"><span data-fr data-key="intake.date_label"></span><span data-en data-key="intake.date_label"></span></label>
      <input type="date" id="delivery-date" name="delivery-date">
    </div>

    <button type="submit" class="submit-btn"><span data-fr data-key="intake.submit"></span><span data-en data-key="intake.submit"></span></button>
  </form>
</div>

<script>
  // ---------------------------------------------------------------
  // intake-form.html script overview:
  //   1. Language toggle, also drives the textarea placeholder and the
  //      Project Type <option> labels (which can't use CSS data-fr/data-en
  //      spans — browsers render <option> as plain text, ignoring any HTML
  //      inside it, so the options are rebuilt in JS instead)
  //   2. i18n.js is loaded twice: synchronously with its built-in defaults
  //      (so the form looks right immediately), then again once data/strings.json
  //      has actually loaded, in case anything's been edited in the admin
  //   3. Form submit -> builds a mailto: link (no backend on GitHub Pages)
  // ---------------------------------------------------------------

  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr');
  function updateLangButton() {
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  function updatePlaceholder() {
    const desc = document.getElementById('description');
    const key = body.classList.contains('lang-fr') ? 'frPlaceholder' : 'enPlaceholder';
    desc.placeholder = desc.dataset[key]; // set from data-fr-placeholder/data-en-placeholder, filled by applyStrings()
  }
  // Rebuilds the Project Type <select> options in the current language, using the
  // shared PROJECT_TYPES map from i18n.js. Preserves whatever was already selected.
  function updateTypeOptions() {
    const select = document.getElementById('project-type');
    const isFr = body.classList.contains('lang-fr');
    const previous = select.value;
    select.innerHTML = '<option value=""></option>' + Object.keys(PROJECT_TYPES).map((code) => {
      const t = PROJECT_TYPES[code];
      const acronym = isFr ? t.frAcronym : t.enAcronym;
      const label = isFr ? t.frLabel : t.enLabel;
      // Skip the " — Label" part when acronym and label are the same word (FILM, WEB)
      const text = acronym.toLowerCase() === label.toLowerCase() ? acronym : `${acronym} — ${label}`;
      return `<option value="${code}">${text}</option>`;
    }).join('');
    select.value = previous;
  }
  updateLangButton();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
    updatePlaceholder();
    updateTypeOptions();
  });

  // First pass with i18n.js's built-in defaults, so the form is fully readable before
  // any network request finishes. applyStrings() needs data-key elements already in the
  // DOM, which they are — it doesn't need the fetch to have completed, just the script.
  applyStrings();
  updatePlaceholder();
  updateTypeOptions();

  // Second pass once data/strings.json has actually loaded, in case any of these were
  // edited in the admin — re-applies everything so edits show up without a hardcoded wait.
  loadI18n().then(() => {
    applyStrings();
    updatePlaceholder();
    updateTypeOptions();
  });

  // Destination address comes from data/settings.json (editable in the admin) rather
  // than being hardcoded, so it stays in sync with the address shown on the homepage.
  let destinationEmail = 'iouattarabalde@gmail.com'; // fallback in case the fetch below fails
  fetch('data/settings.json')
    .then((r) => r.json())
    .then((s) => { destinationEmail = s.email; })
    .catch((err) => console.error('Impossible de charger les coordonnées:', err));

  // No backend on GitHub Pages, so "submitting" just opens the visitor's email client
  // with a pre-filled message instead of posting anywhere.
  document.getElementById('intake-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const f = new FormData(this);
    const lines = [
      'Nom: ' + f.get('name'),
      'Courriel: ' + f.get('email'),
      'Type de projet: ' + f.get('project-type'),
      'Description: ' + f.get('description'),
      'Date souhaitée: ' + f.get('delivery-date')
    ];
    // Named mailBody (not "body") to avoid shadowing the document.body reference above
    const mailBody = encodeURIComponent(lines.join('\n'));
    const subject = encodeURIComponent('Nouveau projet — ' + f.get('name'));
    window.location.href = 'mailto:' + destinationEmail + '?subject=' + subject + '&body=' + mailBody;
  });
</script>
</body>
</html>
