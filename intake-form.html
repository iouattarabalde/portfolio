<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><span>Intake</span> — Ismael OB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="lang-fr">

<nav class="site-nav">
  <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr>Travaux</span><span data-en>Work</span></a>
    <a href="index.html#contact">Contact</a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR / EN</button>
  </div>
</nav>

<div class="form-wrap">
  <p class="eyebrow"><span data-fr>Nouveau projet</span><span data-en>New project</span></p>
  <h1 style="font-family:var(--display); font-size:clamp(24px,4vw,34px); margin:10px 0 8px;">
    <span data-fr>Parlons de votre projet</span><span data-en>Tell me about your project</span>
  </h1>
  <p style="color:var(--fg-dim); font-size:13px; margin-bottom:32px;">
    <span data-fr>Ces informations permettent une soumission précise dès le premier échange.</span>
    <span data-en>This information allows for an accurate quote from the first exchange.</span>
  </p>

  <form id="intake-form">
    <div class="field">
      <label for="name"><span data-fr>Nom</span><span data-en>Name</span></label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="field">
      <label for="email"><span data-fr>Courriel</span><span data-en>Email</span></label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="field">
      <label for="company"><span data-fr>Compagnie / studio</span><span data-en>Company / studio</span></label>
      <input type="text" id="company" name="company">
    </div>

    <div class="field">
      <label for="project-type"><span data-fr>Type de projet</span><span data-en>Project type</span></label>
      <select id="project-type" name="project-type" required>
        <option value=""></option>
        <option value="AD">AD — <span data-fr>Publicité</span><span data-en>Advertising</span></option>
        <option value="MV">MV — <span data-fr>Vidéoclip</span><span data-en>Music video</span></option>
        <option value="FILM">FILM</option>
        <option value="TV">TV</option>
        <option value="YT">YT — YouTube / Web</option>
      </select>
    </div>

    <div class="field">
      <label for="camera"><span data-fr>Caméra(s) utilisée(s)</span><span data-en>Camera(s) used</span></label>
      <input type="text" id="camera" name="camera" placeholder="ex. Sony FX6, ARRI Alexa Mini">
    </div>

    <div class="field">
      <label for="editing"><span data-fr>Logiciel de montage</span><span data-en>Editing software</span></label>
      <input type="text" id="editing" name="editing" placeholder="ex. Premiere Pro, Avid">
    </div>

    <div class="field">
      <label for="deliverables"><span data-fr>Nombre de livrables et versions</span><span data-en>Number of deliverables and versions</span></label>
      <input type="text" id="deliverables" name="deliverables" placeholder="ex. 1 master 60s + 3 déclinaisons 15s">
    </div>

    <div class="field">
      <label for="delivery-type"><span data-fr>Type de livraison</span><span data-en>Delivery type</span></label>
      <select id="delivery-type" name="delivery-type">
        <option value=""></option>
        <option value="clips-handles"><span data-fr>Clips individuels avec poignées</span><span data-en>Individual clips with handles</span></option>
        <option value="timeline-export"><span data-fr>Export de la timeline complète</span><span data-en>Full timeline export</span></option>
      </select>
    </div>

    <div class="field">
      <label for="resolution"><span data-fr>Résolution de livraison</span><span data-en>Delivery resolution</span></label>
      <input type="text" id="resolution" name="resolution" placeholder="ex. UHD 4K, HD 1080p">
    </div>

    <div class="field">
      <label for="vfx"><span data-fr>Présence de VFX (plaques, handoff de composition)</span><span data-en>VFX presence (plates, compositing handoff)</span></label>
      <textarea id="vfx" name="vfx"></textarea>
    </div>

    <div class="field">
      <label for="delivery-date"><span data-fr>Date de livraison souhaitée</span><span data-en>Desired delivery date</span></label>
      <input type="date" id="delivery-date" name="delivery-date">
    </div>

    <div class="field">
      <label for="notes"><span data-fr>Notes additionnelles</span><span data-en>Additional notes</span></label>
      <textarea id="notes" name="notes"></textarea>
    </div>

    <button type="submit" class="submit-btn"><span data-fr>Envoyer</span><span data-en>Send</span></button>
  </form>
</div>

<footer>
  <span>© 2026 ISMAEL OB</span>
  <span>MONTRÉAL, QC</span>
</footer>

<script>
  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'en') body.classList.add('lang-en');
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-en');
    localStorage.setItem('iob-lang', body.classList.contains('lang-en') ? 'en' : 'fr');
    document.documentElement.lang = body.classList.contains('lang-en') ? 'en' : 'fr';
  });

  // Pas de backend sur GitHub Pages : on compose un mailto avec les réponses.
  document.getElementById('intake-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const f = new FormData(this);
    const lines = [
      'Nom: ' + f.get('name'),
      'Courriel: ' + f.get('email'),
      'Compagnie: ' + f.get('company'),
      'Type de projet: ' + f.get('project-type'),
      'Caméra(s): ' + f.get('camera'),
      'Logiciel de montage: ' + f.get('editing'),
      'Livrables: ' + f.get('deliverables'),
      'Type de livraison: ' + f.get('delivery-type'),
      'Résolution: ' + f.get('resolution'),
      'VFX: ' + f.get('vfx'),
      'Date souhaitée: ' + f.get('delivery-date'),
      'Notes: ' + f.get('notes')
    ];
    const body = encodeURIComponent(lines.join('\n'));
    const subject = encodeURIComponent('Nouveau projet — ' + (f.get('company') || f.get('name')));
    window.location.href = 'mailto:ismael@ismaelob.com?subject=' + subject + '&body=' + body;
  });
</script>
</body>
</html>
