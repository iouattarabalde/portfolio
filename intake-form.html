<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau projet — Ismael OB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=7">
<script src="types.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr>Coloriste</span><span data-en>Colorist</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr>Travaux</span><span data-en>Work</span></a>
    <a href="index.html#contact">Contact</a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<div class="form-wrap">
  <p class="eyebrow"><span data-fr>Nouveau projet</span><span data-en>New project</span></p>
  <h1 style="font-family:var(--display); font-size:clamp(24px,4vw,34px); margin:10px 0 8px;">
    <span data-fr>Parlons de votre projet</span><span data-en>Tell me about your project</span>
  </h1>
  <p style="color:var(--fg-dim); font-size:13px; margin-bottom:32px;">
    <span data-fr>Quelques informations pour démarrer, on précise le reste ensemble par la suite.</span>
    <span data-en>A few details to get started, we'll figure out the rest together.</span>
  </p>

  <form id="intake-form">
    <div class="field">
      <label for="name"><span data-fr>Nom</span><span data-en>Name</span></label>
      <input type="text" id="name" name="name" placeholder="Nom — compagnie (optionnel)" required>
    </div>

    <div class="field">
      <label for="email"><span data-fr>Courriel</span><span data-en>Email</span></label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="field">
      <label for="project-type"><span data-fr>Type de projet</span><span data-en>Project type</span></label>
      <select id="project-type" name="project-type" required>
        <option value=""></option>
      </select>
    </div>

    <div class="field">
      <label for="description"><span data-fr>Décris ton projet</span><span data-en>Describe your project</span></label>
      <textarea id="description" name="description" rows="5" placeholder="Caméra, logiciel de montage, livrables, VFX... tout ce qui aide à comprendre le projet." data-fr-placeholder="Caméra, logiciel de montage, livrables, VFX... tout ce qui aide à comprendre le projet." data-en-placeholder="Camera, editing software, deliverables, VFX... anything that helps understand the project."></textarea>
    </div>

    <div class="field">
      <label for="delivery-date"><span data-fr>Date de livraison souhaitée</span><span data-en>Desired delivery date</span></label>
      <input type="date" id="delivery-date" name="delivery-date">
    </div>

    <button type="submit" class="submit-btn"><span data-fr>Envoyer</span><span data-en>Send</span></button>
  </form>
</div>

<script>
  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr');
  function updateLangButton() {
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  function updatePlaceholder() {
    const desc = document.getElementById('description');
    const key = body.classList.contains('lang-fr') ? 'frPlaceholder' : 'enPlaceholder';
    desc.placeholder = desc.dataset[key];
  }
  function updateTypeOptions() {
    const select = document.getElementById('project-type');
    const isFr = body.classList.contains('lang-fr');
    const previous = select.value;
    select.innerHTML = '<option value=""></option>' + Object.keys(PROJECT_TYPES).map((code) => {
      const t = PROJECT_TYPES[code];
      const acronym = isFr ? t.frAcronym : t.enAcronym;
      const label = isFr ? t.frLabel : t.enLabel;
      const text = acronym.toLowerCase() === label.toLowerCase() ? acronym : `${acronym} — ${label}`;
      return `<option value="${code}">${text}</option>`;
    }).join('');
    select.value = previous;
  }
  updateLangButton();
  updatePlaceholder();
  updateTypeOptions();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
    updatePlaceholder();
    updateTypeOptions();
  });

  // Pas de backend sur GitHub Pages : on compose un mailto avec les réponses.
  document.getElementById('intake-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const f = new FormData(this);
    const lines = [
      'Nom: ' + f.get('name'),
      'Courriel: ' + f.get('email'),
      'Type de projet: ' + f.get('project-type'),
      'Description: ' + f.get('description'),
      'Date souhaitée: ' + f.get('delivery-date')
    ];
    const body = encodeURIComponent(lines.join('\n'));
    const subject = encodeURIComponent('Nouveau projet — ' + f.get('name'));
    window.location.href = 'mailto:iouattarabalde@gmail.com?subject=' + subject + '&body=' + body;
  });
</script>
</body>
</html>
