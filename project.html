<!DOCTYPE html>
<!--
  project.html — single dynamic template for every project (no more per-project HTML files).
  Reads the project id from the URL query string (?project=slug), looks it up in
  data/projects.json, and renders its gallery + credits. Visited as e.g.
  project.html?project=fleur-de-peau, linked from the work grid on index.html.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Project — Ismael OB</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<!-- Generic sharing card: crawlers don't run JS, so per-project OG tags aren't possible
     on a static host — every project link shares the same site-wide card as index.html. -->
<meta property="og:type" content="website">
<meta property="og:title" content="Ismael OB — Colorist">
<meta property="og:description" content="Color grading for commercials, music videos, film and television. Based in Montreal, available remote.">
<meta property="og:image" content="https://ismaelob.com/assets/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=26">
<script src="i18n.js"></script>
<script src="design.js?v=3"></script>
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr data-key="nav.eyebrow"></span><span data-en data-key="nav.eyebrow"></span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr data-key="nav.work"></span><span data-en data-key="nav.work"></span></a>
    <a href="index.html#contact"><span data-fr data-key="nav.contact"></span><span data-en data-key="nav.contact"></span></a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<!-- Filled by JS below once the project is found in projects.json -->
<section class="project-gallery" id="project-gallery"></section>

<!-- Hidden until the project is found and rendered (display:none avoids a flash of empty content) -->
<section class="project-info" id="project-info" style="display:none;">
  <a class="project-back" href="index.html#work">← <span data-fr data-key="project.back"></span><span data-en data-key="project.back"></span></a>
  <h1 class="project-title" id="project-title"></h1>
  <dl class="credits">
    <div>
      <dt><span data-fr data-key="project.type_label"></span><span data-en data-key="project.type_label"></span></dt>
      <dd id="project-type">—</dd>
    </div>
    <div id="project-client-wrap" style="display:none;">
      <dt><span data-fr data-key="project.client_label"></span><span data-en data-key="project.client_label"></span></dt>
      <dd id="project-client">—</dd>
    </div>
    <div id="project-artist-wrap" style="display:none;">
      <dt><span data-fr data-key="project.artist_label"></span><span data-en data-key="project.artist_label"></span></dt>
      <dd id="project-artist">—</dd>
    </div>
    <div>
      <dt><span data-fr data-key="project.director_label"></span><span data-en data-key="project.director_label"></span></dt>
      <dd id="project-director">—</dd>
    </div>
    <div>
      <dt><span data-fr data-key="project.dp_label"></span><span data-en data-key="project.dp_label"></span></dt>
      <dd id="project-dp">—</dd>
    </div>
  </dl>
</section>

<!-- Shown instead of project-info if the ?project= id doesn't match anything in projects.json -->
<section class="project-info" id="project-not-found" style="display:none;">
  <p class="eyebrow"><span data-fr data-key="project.not_found_eyebrow"></span><span data-en data-key="project.not_found_eyebrow"></span></p>
  <h1 class="project-title">
    <span data-fr data-key="project.not_found_heading"></span>
    <span data-en data-key="project.not_found_heading"></span>
  </h1>
  <a class="project-back" href="index.html#work">← <span data-fr data-key="project.back"></span><span data-en data-key="project.back"></span></a>
</section>

<!-- Full-screen image viewer, opened by clicking any gallery thumbnail (see wireLightbox below) -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" type="button">✕ <span data-fr data-key="lightbox.close"></span><span data-en data-key="lightbox.close"></span></button>
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev" type="button" aria-label="Previous image">←</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" id="lightbox-next" type="button" aria-label="Next image">→</button>
</div>

<script>
  // ---------------------------------------------------------------
  // project.html script overview:
  //   1. Language toggle (same pattern as index.html)
  //   2. Lightbox (click a still to enlarge; close via ✕, Escape, or clicking the backdrop)
  //   3. Load i18n.js (all static copy + type acronyms) and the requested project from
  //      data/projects.json in parallel, then render both
  // ---------------------------------------------------------------

  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr');
  function updateLangButton() {
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  updateLangButton();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
    renderProjectType(); // re-run so the Type field switches acronym language too
  });

  // Lightbox: wireLightbox() attaches click handlers to gallery thumbnails, opening each
  // at its own index. It's called again after the gallery is (re)rendered from JSON,
  // since those <button> elements don't exist yet when this script first runs.
  // Navigation (arrows + keyboard) loops: past the last image wraps to the first and
  // vice versa, via the (i + length) % length trick in openLightboxAt.
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxPrev = document.getElementById('lightbox-prev');
  const lightboxNext = document.getElementById('lightbox-next');
  let lightboxIndex = -1;

  function openLightboxAt(index) {
    if (!currentProject) return;
    const gallery = currentProject.gallery;
    lightboxIndex = (index + gallery.length) % gallery.length; // loops both directions
    const filename = gallery[lightboxIndex];
    lightboxImg.src = `assets/${filename}`;
    lightboxImg.alt = `${currentProject.title} — still ${lightboxIndex + 1}`;
    lightbox.classList.add('open');
    const hasMultiple = gallery.length > 1;
    lightboxPrev.style.display = hasMultiple ? '' : 'none';
    lightboxNext.style.display = hasMultiple ? '' : 'none';
  }
  function wireLightbox() {
    document.querySelectorAll('.gallery-item').forEach((item, idx) => {
      item.addEventListener('click', () => openLightboxAt(idx));
    });
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', (e) => { e.stopPropagation(); openLightboxAt(lightboxIndex - 1); });
  lightboxNext.addEventListener('click', (e) => { e.stopPropagation(); openLightboxAt(lightboxIndex + 1); });
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox(); // only closes on backdrop clicks, not the image itself
  });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') openLightboxAt(lightboxIndex - 1);
    else if (e.key === 'ArrowRight') openLightboxAt(lightboxIndex + 1);
  });

  // Which project to show comes from the URL, e.g. project.html?project=fleur-de-peau
  const params = new URLSearchParams(window.location.search);
  const projectId = params.get('project');
  let currentProject = null; // cached after fetch so renderProjectType() can re-run on language toggle

  function renderProjectType() {
    if (!currentProject) return;
    const isFr = body.classList.contains('lang-fr');
    document.getElementById('project-type').textContent = projectTypeAcronym(currentProject.type, isFr) || '—';
  }

  // i18n and the project data are independent fetches, loaded in parallel — applyStrings()
  // fills every data-key element (labels, back link, etc.), and the project.type acronym
  // rendered by renderProjectType() also depends on i18n.js's PROJECT_TYPES being loaded.
  Promise.all([
    loadI18n(),
    fetch('data/projects.json').then((r) => r.json())
  ])
    .then(([, data]) => {
      applyStrings();

      const project = data.projects.find((p) => p.id === projectId);
      if (!project) {
        document.getElementById('project-not-found').style.display = '';
        return;
      }
      currentProject = project;

      document.getElementById('page-title').textContent = project.title + ' — Ismael OB';
      document.getElementById('project-title').textContent = project.title;
      renderProjectType();
      if (project.client) {
        document.getElementById('project-client').textContent = project.client;
        document.getElementById('project-client-wrap').style.display = '';
      }
      if (project.artist) {
        document.getElementById('project-artist').textContent = project.artist;
        document.getElementById('project-artist-wrap').style.display = '';
      }
      document.getElementById('project-director').textContent = project.director || '—';
      document.getElementById('project-dp').textContent = project.dp || '—';

      // Gallery order matches the order of filenames in projects.json's "gallery" array —
      // that's exactly what the admin's drag-and-drop reordering updates.
      const gallery = document.getElementById('project-gallery');
      gallery.innerHTML = project.gallery.map((filename, i) => `
        <button class="gallery-item" data-full="assets/${filename}">
          <img src="assets/${filename}" alt="${project.title} — still ${i + 1}" loading="lazy">
        </button>
      `).join('');

      document.getElementById('project-info').style.display = '';
      wireLightbox();
    })
    .catch((err) => {
      console.error('Impossible de charger le projet:', err);
      document.getElementById('project-not-found').style.display = '';
    });
</script>
</body>
</html>
