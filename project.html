<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titre du projet — Ismael OB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr>Coloriste</span><span data-en>Colorist</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr>Travaux</span><span data-en>Work</span></a>
    <a href="index.html#contact">Contact</a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<!-- Dupliquer .gallery-item pour chaque still du projet. data-full pointe vers l'image en pleine résolution (peut être la même que src). -->
<section class="project-gallery">
  <button class="gallery-item" data-full="assets/PLACEHOLDER-01.jpg">
    <img src="assets/PLACEHOLDER-01.jpg" alt="Titre du projet — still 1" loading="lazy">
  </button>
  <button class="gallery-item" data-full="assets/PLACEHOLDER-02.jpg">
    <img src="assets/PLACEHOLDER-02.jpg" alt="Titre du projet — still 2" loading="lazy">
  </button>
  <button class="gallery-item" data-full="assets/PLACEHOLDER-03.jpg">
    <img src="assets/PLACEHOLDER-03.jpg" alt="Titre du projet — still 3" loading="lazy">
  </button>
</section>

<section class="project-info">
  <a class="project-back" href="index.html#work">← <span data-fr>Retour aux travaux</span><span data-en>Back to work</span></a>
  <h1 class="project-title">Titre du projet</h1>
  <dl class="credits">
    <div>
      <dt><span data-fr>Type</span><span data-en>Type</span></dt>
      <dd>—</dd>
    </div>
    <div>
      <dt><span data-fr>Réalisation</span><span data-en>Director</span></dt>
      <dd>—</dd>
    </div>
    <div>
      <dt><span data-fr>Image</span><span data-en>DP</span></dt>
      <dd>—</dd>
    </div>
  </dl>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" type="button">✕ <span data-fr>Fermer</span><span data-en>Close</span></button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr');
  function updateLangButton() {
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  updateLangButton();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
  });

  // Lightbox : clic sur une vignette de la galerie pour l'agrandir.
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  document.querySelectorAll('.gallery-item').forEach((item) => {
    item.addEventListener('click', () => {
      lightboxImg.src = item.dataset.full || item.querySelector('img').src;
      lightboxImg.alt = item.querySelector('img').alt;
      lightbox.classList.add('open');
    });
  });
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
</body>
</html>
