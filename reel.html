<!DOCTYPE html>
<!--
  reel.html — dedicated reel page (nav: Projects / Reel / Contact). Same video file as the
  homepage hero (video/reel.mp4), but presented as a proper player: native controls, sound,
  no autoplay, poster frame (assets/reel-poster.jpg, extracted from the reel itself —
  regenerate it when the reel changes). Directly linkable in outreach emails:
  ismaelob.com/reel.html
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel — Ismael OB</title>
<meta name="description" content="Demo reel — Ismael OB, colorist based in Montreal.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ismaelob.com/reel.html">
<meta property="og:title" content="Reel — Ismael OB">
<meta property="og:description" content="Color grading for commercials, music videos, film and television. Based in Montreal, available remote.">
<meta property="og:image" content="https://ismaelob.com/assets/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=22">
<script src="i18n.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="brand">
    <a href="index.html" class="wordmark">ISMAEL<span>OB</span></a>
    <span class="nav-eyebrow"><span data-fr data-key="nav.eyebrow"></span><span data-en data-key="nav.eyebrow"></span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#work"><span data-fr data-key="nav.work"></span><span data-en data-key="nav.work"></span></a>
    <a href="reel.html" aria-current="page"><span data-fr data-key="nav.reel"></span><span data-en data-key="nav.reel"></span></a>
    <a href="index.html#contact"><span data-fr data-key="nav.contact"></span><span data-en data-key="nav.contact"></span></a>
    <button id="lang-toggle" type="button" aria-label="Toggle language">FR</button>
  </div>
</nav>

<!-- Same .reel-frame/.reel-embed chrome as the homepage hero (corner brackets, hairline
     border), sized purely in CSS here (.reel-page rules) — no JS sizing needed since the
     player doesn't have to fill the viewport exactly. -->
<main class="reel-page">
  <div class="reel-frame">
    <div class="reel-embed">
      <video controls playsinline preload="metadata" poster="assets/reel-poster.jpg" title="Ismael OB - Demo Reel">
        <source src="video/reel.mp4" type="video/mp4">
      </video>
    </div>
  </div>
</main>

<script>
  // Language toggle only — same pattern as every other page.
  const btn = document.getElementById('lang-toggle');
  const body = document.body;
  const stored = localStorage.getItem('iob-lang');
  if (stored === 'fr') body.classList.add('lang-fr');
  function updateLangButton() {
    btn.textContent = body.classList.contains('lang-fr') ? 'EN' : 'FR';
  }
  updateLangButton();
  btn.addEventListener('click', () => {
    body.classList.toggle('lang-fr');
    localStorage.setItem('iob-lang', body.classList.contains('lang-fr') ? 'fr' : 'en');
    document.documentElement.lang = body.classList.contains('lang-fr') ? 'fr' : 'en';
    updateLangButton();
  });

  loadI18n().then(applyStrings);
</script>
</body>
</html>
